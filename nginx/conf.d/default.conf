server {
    listen 80;
    server_name localhost;
    
    # Корневая директория
    root /var/www/html;
    index index.php index.html;

    # Кодировки
    charset utf-8;

    # Логи (лучше вынести в отдельные файлы)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Максимальный размер загружаемых файлов
    client_max_body_size 100M;

    # Основные правила для статики
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Запрет доступа к скрытым файлам (начинающимся с точки)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Запрет доступа к чувствительным файлам
    location ~ \.(env|log|bak|sh|sql|git|svn)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Кэширование статических файлов
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        log_not_found off;
    }

    # Сжатие gzip (отдавать сжатые версии)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Обработка PHP
    location ~ \.php$ {
        # Проверка существования файла
        try_files $uri =404;
        
        # FastCGI параметры
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        
        # Параметры таймаута
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 180;
        fastcgi_read_timeout 180;
        
        # Буферизация
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        
        # Параметры скрипта
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        include fastcgi_params;
    }

    # Запрет на выполнение PHP в загружаемых папках (если есть)
    location ~* /(uploads|files|images)/.*\.php$ {
        deny all;
        access_log off;
        log_not_found off;
        return 403;
    }

    # Свои страницы ошибок (опционально)
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
